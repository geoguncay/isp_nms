services:
  # ─────────────────────────────────────────────
  # API FastAPI
  # ─────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: api
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - isp_net

  # ─────────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────────
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: celery_worker
    restart: unless-stopped
    env_file: .env
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - isp_net

  # ─────────────────────────────────────────────
  # Celery Beat (scheduler)
  # ─────────────────────────────────────────────
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: celery_beat
    restart: unless-stopped
    env_file: .env
    command: celery -A app.workers.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler -s /app/celerybeat/celerybeat-schedule
    volumes:
      - ./backend:/app
      - celery_beat_data:/app/celerybeat
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - isp_net

  # ─────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - isp_net

  # ─────────────────────────────────────────────
  # Redis
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - isp_net

  # ─────────────────────────────────────────────
  # Adminer (DB management UI)
  # ─────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - isp_net

  # ─────────────────────────────────────────────
  # Frontend (Vite dev server)
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - API_PROXY_TARGET=http://api:8000
    networks:
      - isp_net

  # ─────────────────────────────────────────────
  # ZeroTier (opcional) — acceso remoto a toda la plataforma sin exponer
  # puertos públicos ni depender de una IP fija.
  #
  # Requiere un host Linux (network_mode: host no funciona igual en Docker
  # Desktop para Mac/Windows). No se levanta con un `docker compose up` normal;
  # actívalo explícitamente con:
  #   docker compose --profile zerotier up -d zerotier
  #
  # Primer uso:
  #   1. docker compose exec zerotier zerotier-cli join <NETWORK_ID>
  #   2. Autorizar el nodo desde Ajustes > Integraciones > ZeroTier en la app
  #      (o desde my.zerotier.com si aún no configuraste la integración).
  #
  # Al usar network_mode: host, el contenedor comparte la red del servidor:
  # cualquier puerto que Docker ya publica (5173, 8000, etc.) queda accesible
  # también desde la IP ZeroTier asignada al host, sin tocar el resto del stack.
  # ─────────────────────────────────────────────
  zerotier:
    image: zerotier/zerotier:latest
    container_name: zerotier
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun
    volumes:
      - zerotier_data:/var/lib/zerotier-one
    profiles:
      - zerotier

networks:
  isp_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  celery_beat_data:
  zerotier_data:
